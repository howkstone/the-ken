name = "ken-api"
main = "worker.js"
compatibility_date = "2024-01-01"
# Custom domain: add theken.uk to Cloudflare dashboard first, then uncomment:
# routes = [{ pattern = "api.theken.uk/*", zone_name = "theken.uk" }]

[[kv_namespaces]]
binding = "KEN_KV"
id = "b775853748654842bb92b697269b350d"

[[kv_namespaces]]
binding = "KEN_PII"
id = "ccf0daf934334ef087b46231014bb815"

# R2 bucket for media (photos, voicemails, video)
# Enable R2 in Cloudflare dashboard first, then create bucket:
#   npx wrangler r2 bucket create ken-media
# Then uncomment:
# [[r2_buckets]]
# binding = "KEN_MEDIA"
# bucket_name = "ken-media"

[triggers]
crons = ["*/2 * * * *"]
