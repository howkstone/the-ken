<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=600, height=1024, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>The Ken</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cream: #F5F0E8;
      --warm-white: #FDFAF5;
      --ink: #1A1714;
      --mid: #6B6459;
      --gold: #C4A962;
      --gold-light: #D9C48A;
    }

    html, body {
      width: 600px;
      height: 1024px;
      background: var(--warm-white);
      color: var(--ink);
      font-family: 'Jost', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Subtle texture */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    .container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 32px 24px;
    }

    /* Top bar: clock + date */
    .top-bar {
      display: flex;
      justify-content: flex-end;
      align-items: flex-start;
      margin-bottom: 40px;
    }

    .time-display {
      text-align: right;
    }

    .clock {
      font-family: 'Jost', sans-serif;
      font-weight: 400;
      font-size: 32px;
      color: var(--ink);
      letter-spacing: 0.02em;
      line-height: 1;
    }

    .date {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 16px;
      color: var(--mid);
      letter-spacing: 0.03em;
      margin-top: 4px;
    }

    /* Phone icon + prompt section */
    .call-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 48px;
    }

    .phone-icon {
      width: 140px;
      height: 140px;
      margin-bottom: 24px;
    }

    .phone-icon svg {
      width: 100%;
      height: 100%;
      fill: none;
      stroke: var(--gold);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .prompt {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 28px;
      color: var(--gold);
      letter-spacing: 0.02em;
      text-align: center;
      line-height: 1.3;
      max-width: 480px;
    }

    /* Contact grid */
    .contacts-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      flex: 1;
      align-content: start;
    }

    .contact-tile {
      background: rgba(245, 240, 232, 0.4);
      border: 2px solid rgba(196, 169, 98, 0.3);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: all 0.2s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .contact-tile:active {
      background: rgba(245, 240, 232, 0.7);
      border-color: var(--gold);
      transform: scale(0.98);
    }

    .contact-photo {
      width: 160px;
      height: 160px;
      border-radius: 12px;
      border: 3px solid var(--cream);
      background: var(--cream);
      margin-bottom: 16px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(26, 23, 20, 0.08);
    }

    .contact-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Fallback if photo fails to load */
    .contact-photo-fallback {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, var(--cream), var(--gold-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 64px;
      color: var(--mid);
    }

    .contact-name {
      font-family: 'Jost', sans-serif;
      font-weight: 400;
      font-size: 22px;
      color: var(--ink);
      text-align: center;
      line-height: 1.2;
      letter-spacing: 0.01em;
    }

    /* Loading state */
    .loading {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px;
      color: var(--mid);
      font-style: italic;
    }

    /* Error state */
    .error {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px;
      color: var(--mid);
      font-size: 18px;
    }

    /* Responsive touch feedback */
    @media (pointer: coarse) {
      .contact-tile {
        cursor: default;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Top bar: clock + date -->
    <div class="top-bar">
      <div class="time-display">
        <div class="clock" id="clock">10:23</div>
        <div class="date" id="date">Friday 13 March</div>
      </div>
    </div>

    <!-- Phone icon + prompt -->
    <div class="call-section">
      <div class="phone-icon">
        <!-- Traditional phone handset icon -->
        <svg viewBox="0 0 24 24">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
        </svg>
      </div>
      <div class="prompt">Ask Ken who you'd like to call</div>
    </div>

    <!-- Contact grid: dynamically loaded -->
    <div class="contacts-grid" id="contactsGrid">
      <div class="loading">Loading contacts...</div>
    </div>
  </div>

  <script>
    // Live clock
    function updateTime() {
      const now = new Date();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      document.getElementById('clock').textContent = `${hours}:${minutes}`;

      const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
      const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
      const dayName = days[now.getDay()];
      const day = now.getDate();
      const month = months[now.getMonth()];
      document.getElementById('date').textContent = `${dayName} ${day} ${month}`;
    }

    updateTime();
    setInterval(updateTime, 1000);

    // Load contacts from JSON
    function loadContacts() {
      fetch('./contacts.json')
        .then(response => {
          if (!response.ok) {
            throw new Error('Failed to load contacts');
          }
          return response.json();
        })
        .then(data => {
          const grid = document.getElementById('contactsGrid');
          grid.innerHTML = ''; // Clear loading message

          if (!data.contacts || data.contacts.length === 0) {
            grid.innerHTML = '<div class="error">No contacts found. Please add contacts via the admin portal.</div>';
            return;
          }

          // Sort by position
          const sortedContacts = data.contacts.sort((a, b) => a.position - b.position);

          // Display first 4 contacts
          sortedContacts.slice(0, 4).forEach(contact => {
            const tile = document.createElement('div');
            tile.className = 'contact-tile';
            tile.onclick = () => callContact(contact);

            // Create photo element with fallback
            const photoDiv = document.createElement('div');
            photoDiv.className = 'contact-photo';

            const img = document.createElement('img');
            img.src = contact.photo;
            img.alt = contact.name;
            img.onerror = () => {
              // If image fails to load, show fallback
              photoDiv.innerHTML = '<div class="contact-photo-fallback">👤</div>';
            };

            photoDiv.appendChild(img);

            // Create name element
            const nameDiv = document.createElement('div');
            nameDiv.className = 'contact-name';
            nameDiv.textContent = contact.name;

            tile.appendChild(photoDiv);
            tile.appendChild(nameDiv);
            grid.appendChild(tile);
          });
        })
        .catch(error => {
          console.error('Error loading contacts:', error);
          const grid = document.getElementById('contactsGrid');
          grid.innerHTML = '<div class="error">Unable to load contacts. Please check contacts.json file.</div>';
        });
    }

    // Call contact (to be expanded with Daily.co integration)
    function callContact(contact) {
      console.log('Calling:', contact.name);
      console.log('Daily.co room:', contact.dailyRoomUrl);
      console.log('Emergency contact:', contact.emergencyContact);

      // TODO: Integrate Daily.co video call
      // For now, just log to console
      // Next step: Load Daily.co iframe and join room

      if (!contact.dailyRoomUrl) {
        console.warn('No Daily.co room URL configured for', contact.name);
        // Show error message or prompt to configure via admin portal
        return;
      }

      // Future: Launch Daily.co call
      // initiateDailyCall(contact.dailyRoomUrl);
    }

    // Prevent accidental zooming
    document.addEventListener('gesturestart', function(e) {
      e.preventDefault();
    });

    // Load contacts on page load
    loadContacts();
  </script>
</body>
</html>
